name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Mock mode keeps the build hermetic — no live SDK calls during CI.
    env:
      INTEGRATION_MODE: mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (non-blocking)
        run: pnpm lint --max-warnings 9999
        continue-on-error: true

      - name: Type check (non-blocking — Vercel re-runs this)
        run: pnpm exec tsc --noEmit
        continue-on-error: true

      - name: Test
        run: pnpm test
